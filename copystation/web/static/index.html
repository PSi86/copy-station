<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copy_Station</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main>
    <header>
      <h1>Copy_Station</h1>
      <div class="badges">
        <span id="ap" class="badge ap" hidden>WiFi AP</span>
        <span id="phase" class="badge">--</span>
      </div>
    </header>

    <section id="transfer" class="card">
      <h2>Transfer</h2>
      <div class="progress-track">
        <div id="progress-bar" class="progress-fill"></div>
      </div>
      <div class="row">
        <span id="percent">0%</span>
        <span id="transfer-name"></span>
      </div>
      <div class="row muted">
        <span>Elapsed: <span id="elapsed">--</span></span>
        <span>ETA: <span id="eta">--</span></span>
        <span>Speed: <span id="speed">--</span></span>
        <span><span id="bytes">--</span></span>
      </div>
    </section>

    <section class="card">
      <h2>Detected devices</h2>
      <div id="devices"></div>
    </section>

    <section id="files-card" class="card" hidden>
      <h2>Files</h2>
      <div class="row files-toolbar">
        <select id="file-volume" class="select"></select>
        <button id="file-refresh" class="btn" type="button">Refresh</button>
      </div>
      <div id="file-path" class="breadcrumb muted"></div>
      <ul id="file-list" class="filelist"></ul>
    </section>

    <section id="transcode-card" class="card" hidden>
      <h2>Transcode</h2>
      <div class="row files-toolbar">
        <select id="tc-preset" class="select"></select>
        <label class="tc-out muted">→&nbsp;<select id="tc-output" class="select"></select></label>
      </div>
      <div class="muted tc-hint">Pick a video in Files and press ⚙ to transcode it to the chosen volume.</div>
      <div id="tc-info" class="muted"></div>
      <ul id="tc-jobs" class="filelist"></ul>
    </section>

    <section class="card">
      <h2>Activity log</h2>
      <ul id="log" class="log"></ul>
    </section>

    <footer class="muted" id="conn">connecting…</footer>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
