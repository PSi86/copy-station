# Copy_Station example configuration
#
# All values are optional -- if the file or a key is missing, the defaults from
# copystation/config.py apply (status only via log, source detection purely by
# the DCIM folder). On the device (Cubie A7S or Raspberry Pi 4/5), place it at
# /etc/copystation/config.yaml.

# Base directory for the per-device mountpoints (one subfolder per partition).
mount_base: /run/copystation/mnt

# Name of the media subfolder on the source.
media_dirname: DCIM

identify:
  # Optional hardening: only accept these USB VIDs/PIDs as the source.
  # Leave empty = the source is detected by its DCIM folder alone.
  # Read the DJI VID on the device with `lsusb` and enter it here (lowercase).
  source_usb_vendor_ids: []   # e.g. ["2ca3"]
  source_usb_product_ids: []
  # Partitions smaller than this are ignored (e.g. boot/EFI partitions).
  min_partition_gb: 6
  # Require the source to be smaller than the target, so the larger device is
  # never used as source even if it also carries a DCIM folder.
  require_source_smaller_than_target: true
  # Friendly display names matched by USB VID/PID (shown in the web UI instead of
  # the raw FS label / USB model). The O4's USB product string is only a serial,
  # so a readable "O4 Lite" name comes from here. Find vid:pid with `lsusb`.
  # Match by both, or by vid only / pid only. 2ca3:0020 = DJI O4 Lite (confirmed).
  device_labels:
    - { vid: "2ca3", pid: "0020", name: "O4 Lite" }
  #   - { vid: "2ca3", pid: "0021", name: "O4 Pro" }   # add once the PID is known

cleanup:
  # true: delete DCIM contents, keep the DCIM folder.
  # false: remove the whole DCIM folder (the camera recreates it).
  keep_dcim_folder: true

status:
  # Any combination of: log, led, buzzer, ws2812, grove_led_bar
  backends: [log]

  # GPIO pins below are concrete SUGGESTIONS for the Radxa Cubie A7S 30-pin
  # header (Allwinner port -> line offset; see config.examples/cubie-a7s.yaml
  # for how they are derived). Confirm them with `gpiodetect` / `gpioinfo`
  # before the first hardware test. On a Raspberry Pi use the BCM numbers from
  # config.examples/raspberry-pi.yaml instead (line offset == BCM number).
  # The pins are inert until you add a hardware backend to `backends` above.
  led:
    gpiochip: gpiochip0
    lines:
      ready: 32      # Cubie PB0 (pin 7)  | Pi: BCM27 (green)
      busy: 33       # Cubie PB1 (pin 11) | Pi: BCM22 (yellow)
      error: 34      # Cubie PB2 (pin 29) | Pi: BCM23 (red)

  buzzer:
    gpiochip: gpiochip0
    line: 37         # Cubie PB5 (pin 12) | Pi: BCM24

  # Addressable WS2812B / NeoPixel strip (1-10 LEDs) over SPI MOSI.
  # New device: 2 green flashes, then a white fill gauge for ~3 s. Copy: blue
  # 1..N progress bar (blinking). Error: all LEDs blink red. Ready: first LED green.
  ws2812:
    device: /dev/spidev0.0
    led_count: 1       # number of LEDs in the strip (1-10)

  # Seeed Grove LED Bar v2.0 (MY9221), bit-banged over two GPIO lines.
  # Detecting: brief (~3 s) fill gauge of the device. Copy: bar blinking at 10 Hz.
  # Error: whole bar blinks. Ready: single segment (3).
  grove_led_bar:
    gpiochip: gpiochip0
    clock_line: 108    # Cubie PD12 (pin 19) | Pi: BCM18 (Grove DCKI)
    data_line: 109     # Cubie PD13 (pin 21) | Pi: BCM17 (Grove DI)
    reverse: false     # flip if segment 1 is the wrong physical end

# Optional local web interface (status + progress + storage, future settings).
web:
  enabled: false
  host: 0.0.0.0        # all interfaces; robust to interfaces going up/down
  port: 8080

# Optional GPIO shutdown button. Held for hold_seconds it runs a clean
# `systemctl poweroff` -- the safe way to power the station down (cutting the
# supply while the OS card is being written can corrupt it). Wire a momentary
# button between the GPIO line and GND and keep active_low + bias: pull_up.
power:
  shutdown_button:
    enabled: false
    gpiochip: gpiochip0
    line: null           # button line offset (BCM number on Pi; gpioinfo offset on the Cubie)
    active_low: true      # pressed = pulled to GND
    bias: pull_up         # pull_up | pull_down | disable | as_is
    hold_seconds: 1.0     # must be held this long to trigger (debounce/intent)
    action: poweroff      # poweroff | reboot  (reboot may hang on the A733)

# Settle time (seconds) after device detection before mounting. This is the hard
# upper bound for how long detection waits for a device's volumes to enumerate.
settle_seconds: 2.0
# Adaptive debounce: proceed this many seconds after the LAST USB event instead
# of always waiting the full settle_seconds. Lower = faster detection; keep it at
# or above the gap between a single device's volumes appearing. settle_seconds
# remains the cap, so reliability is unchanged.
settle_quiet_seconds: 1.0
