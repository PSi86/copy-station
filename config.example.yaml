# Copy_Station example configuration
#
# All values are optional -- if the file or a key is missing, the defaults from
# copystation/config.py apply (status only via log, source detection purely by
# the DCIM folder). On the device (Cubie A7S or Raspberry Pi 4/5), place it at
# /etc/copystation/config.yaml.

# Base directory for the per-device mountpoints (one subfolder per partition).
mount_base: /run/copystation/mnt

# Name of the media subfolder on the source.
media_dirname: DCIM

identify:
  # Optional hardening: only accept these USB VIDs/PIDs as the source.
  # Leave empty = the source is detected by its DCIM folder alone.
  # Read the DJI VID on the device with `lsusb` and enter it here (lowercase).
  source_usb_vendor_ids: []   # e.g. ["2ca3"]
  source_usb_product_ids: []
  # Partitions smaller than this are ignored (e.g. boot/EFI partitions).
  min_partition_gb: 6
  # Require the source to be smaller than the target, so the larger device is
  # never used as source even if it also carries a DCIM folder.
  require_source_smaller_than_target: true
  # Friendly display names matched by USB VID/PID (shown in the web UI instead of
  # the raw FS label / USB model). The O4's USB product string is only a serial,
  # so a readable "O4 Lite" name comes from here. Find vid:pid with `lsusb`.
  # Match by both, or by vid only / pid only. 2ca3:0020 = DJI O4 Lite (confirmed).
  device_labels:
    - { vid: "2ca3", pid: "0020", name: "O4 Lite" }
  #   - { vid: "2ca3", pid: "0021", name: "O4 Pro" }   # add once the PID is known

cleanup:
  # true: delete DCIM contents, keep the DCIM folder.
  # false: remove the whole DCIM folder (the camera recreates it).
  keep_dcim_folder: true

status:
  # Any combination of: log, led, buzzer, ws2812, grove_led_bar, epaper
  backends: [log]

  # GPIO pins below are concrete SUGGESTIONS for the Radxa Cubie A7S 30-pin
  # header (Allwinner port -> line offset; see config.examples/cubie-a7s.yaml
  # for how they are derived). Confirm them with `gpiodetect` / `gpioinfo`
  # before the first hardware test. On a Raspberry Pi use the BCM numbers from
  # config.examples/raspberry-pi.yaml instead (line offset == BCM number).
  # The pins are inert until you add a hardware backend to `backends` above.
  led:
    gpiochip: gpiochip0
    lines:
      ready: 32      # Cubie PB0 (pin 7)  | Pi: BCM27 (green)
      busy: 33       # Cubie PB1 (pin 11) | Pi: BCM22 (yellow)
      error: 34      # Cubie PB2 (pin 29) | Pi: BCM23 (red)

  buzzer:
    gpiochip: gpiochip0
    line: 37         # Cubie PB5 (pin 12) | Pi: BCM24

  # Addressable WS2812B / NeoPixel strip (1-10 LEDs) over SPI MOSI.
  # Enable SPI first and point `device` at the resulting node:
  #   Cubie A7S:     `sudo rsetup` -> Overlays -> enable `spidev on SPI1`,
  #                  then device: /dev/spidev1.0 (DIN to SPI1-MOSI = PD12 / pin 19)
  #   Raspberry Pi:  enable SPI (`sudo raspi-config` -> Interface Options -> SPI,
  #                  or `dtparam=spi=on`), then device: /dev/spidev0.0
  #                  (DIN to MOSI = BCM GPIO10 / pin 19)
  # New device: 2 green flashes, then a white fill gauge for ~3 s, then a magenta
  # pulse while waiting. Copy: blue 1..N progress bar (blinking). Error: all LEDs
  # blink red. Ready: first LED green. Service start: cyan wipe; stop: all off.
  ws2812:
    device: /dev/spidev0.0
    led_count: 1       # number of LEDs in the strip (1-10)

  # Seeed Grove LED Bar v2.0 (MY9221), bit-banged over two GPIO lines.
  # Detecting: brief (~3 s) fill gauge of the device. Copy: bar blinking at 10 Hz.
  # Error: whole bar blinks. Ready: single segment (3).
  grove_led_bar:
    gpiochip: gpiochip0
    clock_line: 108    # Cubie PD12 (pin 19) | Pi: BCM18 (Grove DCKI)
    data_line: 109     # Cubie PD13 (pin 21) | Pi: BCM17 (Grove DI)
    reverse: false     # flip if segment 1 is the wrong physical end

  # SPI e-paper display (black/white). Renders the transfer progress bar, the
  # used/free storage of source and target and the current phase. Add `epaper`
  # to `backends` above to enable it. The display keeps growing the bar with fast
  # partial refreshes and does an occasional full refresh to clear ghosting (and
  # always a full refresh when a device disappears).
  #
  # Pick the panel with `model` (fills controller + resolution + a default
  # rotation); override any field below as needed:
  #   waveshare-1.54          -- 200x200, SSD1681 (primary)
  #   waveshare-2.9           -- 296x128, SSD1680
  #   waveshare-2.13          -- 250x122, SSD1680 (Raspberry Pi HAT, V4)
  #   waveshare-2.13-hatplus  -- 250x122, SSD1680 (Raspberry Pi HAT+, Pi 5)
  #   weact-2.9               -- 296x128, SSD1680 (WeAct Studio, same driver)
  #   weact-3.7               -- 480x280, SSD1677 (ROADMAP -- not implemented yet)
  # The 2.13" HATs gate panel power on BCM18, so their presets default `pwr: 18`.
  #
  # Wiring (standard Waveshare module -> Raspberry Pi, BCM == line offset):
  #   VCC->3V3  GND->GND  DIN->MOSI/BCM10  CLK->SCLK/BCM11  CS->CE0/BCM8 (hardware)
  #   DC->BCM25  RST->BCM17  BUSY->BCM24. Enable SPI as for the ws2812 above; the
  #   node is /dev/spidev0.0 on the Pi (use /dev/spidev1.0 on the Cubie A7S).
  # NOTE: the e-paper cannot share an SPI bus with a ws2812 strip (the ws2812
  #   abuses MOSI with strict timing and no chip-select) -- use one or the other.
  epaper:
    model: waveshare-1.54
    device: /dev/spidev0.0
    spi_speed_hz: 4000000
    gpiochip: gpiochip0
    dc: 25             # Cubie: a free PIO offset | Pi: BCM25
    rst: 17            # Pi: BCM17
    busy: 24           # Pi: BCM24
    pwr: null          # optional panel power-enable pin (newer Waveshare revs)
    cs: null           # optional GPIO chip-select (default: SPI hardware CE0)
    rotation: 0        # 0 | 90 | 180 | 270 (content orientation; preset default)
    mirror: false
    busy_active_high: true
    full_refresh_every: 20      # force a full refresh after N partial updates
    partial_min_interval: 2.0   # seconds between partial updates

# Optional local web interface (status + progress + storage, file browser,
# optional transcoding). Served on all interfaces, so it is also reachable over
# the WLAN access point below.
web:
  enabled: false
  host: 0.0.0.0        # all interfaces; robust to interfaces going up/down
  port: 8080
  # Optional HTTP Basic auth for the whole interface (off by default). Sensible
  # once file download is reachable over the AP. Fail-safe: enabling this with an
  # empty password rejects every request rather than leaving it open.
  auth:
    enabled: false
    username: admin
    password: ""
  # Read-only browsing + download of the ATTACHED USB mass storage only (never
  # the OS partitions). Effective only while the web interface is enabled.
  files:
    enabled: true
    allow_download: true
    browse_base: /run/copystation/browse   # separate from the transfer mounts
    idle_unmount_seconds: 120              # release a browsed volume when idle

# Optional WLAN access point so the station hosts its own network in the field
# (the web interface above is then reachable at http://<ipv4_address>:<port>/).
# Managed via NetworkManager (nmcli): the daemon (re)creates the profile from
# these values and brings it up on start. `ipv4.method shared` gives DHCP + NAT
# automatically. WPA2 needs a password of at least 8 characters; an empty
# password leaves the AP down. Requires NetworkManager (default on Raspberry Pi
# OS Bookworm and current Radxa images). It can also be toggled from a user
# button via the `wifi_ap` action below.
wifi_ap:
  enabled: false
  con_name: copystation-ap
  ssid: Copy_Station
  password: ""            # >= 8 chars for WPA2; empty -> AP stays down
  band: bg               # bg (2.4 GHz) | a (5 GHz)
  channel: 6
  ipv4_address: 10.42.0.1/24
  autoconnect: true
  ifname: ""             # empty -> NetworkManager picks the Wi-Fi interface

# Optional video transcoding / resolution change via ffmpeg. Jobs are submitted
# from the web interface (Files -> the ⚙ button on a video). The output is
# written to <output_dirname>/ on the chosen TARGET volume (read-write) and is
# also downloadable. Serialised with the copy daemon, so a copy and a transcode
# never touch the same card at once. Needs ffmpeg installed (scripts/install.sh
# pulls it in); a no-op with a clear error otherwise. Off by default.
transcode:
  enabled: false
  output_dirname: Transcoded
  max_jobs: 1
  # Hardware acceleration. `auto` uses the board's hardware encoder when the
  # installed ffmpeg supports it and falls back to the CPU otherwise:
  #   * Raspberry Pi 4  -> h264_v4l2m2m (H.264 in hardware)
  #   * Raspberry Pi 5  -> no hardware encoder exists -> CPU (libx264/libx265)
  #   * Radxa Cubie A7S -> h264_v4l2m2m / hevc_v4l2m2m (Allwinner Cedar VPU)
  # Set `cpu` to force software, or a specific ffmpeg encoder name (e.g.
  # h264_v4l2m2m) to force hardware. `fallback_to_cpu` retries on the CPU if the
  # hardware encoder fails at runtime.
  acceleration: auto        # auto | cpu | <ffmpeg encoder, e.g. h264_v4l2m2m>
  fallback_to_cpu: true
  # Selectable presets. `height` downscales to that many lines keeping the aspect
  # ratio (width auto, even); `height: 0` keeps the source resolution. `vcodec`
  # is the software codec and picks the family (h264/hevc); `crf` drives software
  # quality, `bitrate` (optional) drives the hardware encoder (a height-based
  # default is used otherwise). A per-preset `accel:` overrides the global one.
  presets:
    - { id: "1080p-h264", label: "1080p H.264", height: 1080, vcodec: libx264, crf: 20, preset: medium }
    - { id: "720p-h264",  label: "720p H.264",  height: 720,  vcodec: libx264, crf: 22, preset: medium }
    - { id: "720p-h265",  label: "720p H.265",  height: 720,  vcodec: libx265, crf: 26, preset: medium }

# Optional GPIO user button. Wire a momentary button between the GPIO line and
# GND and keep active_low + bias: pull_up. Every gesture starts with a short
# activation click (< max_click_seconds) followed by a 0.2-1.0 s release -- an
# intent check that is never counted, so nothing fires by accident. After it:
#  * press and HOLD hold_seconds        -> hold action (DJI-style shutdown:
#    click, release, hold 3 s; a plain long hold alone does nothing). A clean
#    `systemctl poweroff` is the safe way to power the station down -- cutting
#    the supply while the OS card is being written can corrupt it.
#  * 1-3 further short clicks, then >= max_gap_seconds silence -> single/
#    double/triple click action (a triple click is 4 presses in total).
# Actions: poweroff | reboot | none | {command: "shell command"}.
buttons:
  userbutton_1:
    enabled: false
    gpiochip: gpiochip0
    line: null           # button line offset (BCM number on Pi; gpioinfo offset on the Cubie)
    active_low: true      # pressed = pulled to GND
    bias: pull_up         # pull_up | pull_down | disable | as_is
    timing:
      max_click_seconds: 0.6   # a press shorter than this counts as a click
      min_gap_seconds: 0.2     # shorter releases are treated as contact bounce
      max_gap_seconds: 1.0     # a longer release ends the click sequence
      hold_seconds: 3.0        # hold after the activation click -> hold action
    actions:
      # poweroff | reboot | wifi_ap | none | {command: "..."}
      #   wifi_ap toggles the WLAN access point (see wifi_ap: above); on a WS2812
      #   strip it plays a distinct blink code (cyan = on, amber = off) and the
      #   e-paper shows a "WiFi" badge while the AP is up.
      #   (reboot may hang on the A733 -- prefer poweroff.)
      hold: poweroff
      single_click: none
      double_click: none
      triple_click: wifi_ap    # 3 clicks (after the activation click) toggle the AP

# Settle time (seconds) after device detection before mounting. This is the hard
# upper bound for how long detection waits for a device's volumes to enumerate.
settle_seconds: 2.0
# Adaptive debounce: proceed this many seconds after the LAST USB event instead
# of always waiting the full settle_seconds. Lower = faster detection; keep it at
# or above the gap between a single device's volumes appearing. settle_seconds
# remains the cap, so reliability is unchanged.
settle_quiet_seconds: 1.0
