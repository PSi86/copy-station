# Copy_Station example configuration
#
# All values are optional -- if the file or a key is missing, the defaults from
# copystation/config.py apply (status only via log, source detection purely by
# the DCIM folder). On the device (Cubie A7S or Raspberry Pi 4/5), place it at
# /etc/copystation/config.yaml.

# Base directory for the per-device mountpoints (one subfolder per partition).
mount_base: /run/copystation/mnt

# Name of the media subfolder on the source.
media_dirname: DCIM

# Single overlay file for ALL runtime-mutable settings that must survive a restart
# WITHOUT rewriting this (commented) config: auto-transcode on/off, the default
# transcode preset, and the WiFi AP on/off state. They are toggled from the web UI
# / a user button; the overlay wins over the config defaults when present. Delete
# the file to fall back to the config values. The daemon runs as root and can
# write under /var/lib.
user_settings_file: /var/lib/copystation/user-settings.json

identify:
  # Optional hardening: only accept these USB VIDs/PIDs as the source.
  # Leave empty = the source is detected by its DCIM folder alone.
  # Read the DJI VID on the device with `lsusb` and enter it here (lowercase).
  source_usb_vendor_ids: []   # e.g. ["2ca3"]
  source_usb_product_ids: []
  # Partitions smaller than this are ignored (e.g. boot/EFI partitions).
  min_partition_gb: 6
  # Require the source to be smaller than the target, so the larger device is
  # never used as source even if it also carries a DCIM folder.
  require_source_smaller_than_target: true
  # Friendly display names matched by USB VID/PID (shown in the web UI instead of
  # the raw FS label / USB model). The O4's USB product string is only a serial,
  # so a readable "O4 Lite" name comes from here. Find vid:pid with `lsusb`.
  # Match by both, or by vid only / pid only. 2ca3:0020 = DJI O4 Lite (confirmed).
  device_labels:
    - { vid: "2ca3", pid: "0020", name: "O4 Lite" }
  #   - { vid: "2ca3", pid: "0021", name: "O4 Pro" }   # add once the PID is known

cleanup:
  # true: delete DCIM contents, keep the DCIM folder.
  # false: remove the whole DCIM folder (the camera recreates it).
  keep_dcim_folder: true

status:
  # Any combination of: log, led, buzzer, ws2812, grove_led_bar, epaper
  backends: [log]

  # GPIO pins below are concrete SUGGESTIONS for the Radxa Cubie A7S 30-pin
  # header (Allwinner port -> line offset; see config.examples/cubie-a7s.yaml
  # for how they are derived). Confirm them with `gpiodetect` / `gpioinfo`
  # before the first hardware test. On a Raspberry Pi use the BCM numbers from
  # config.examples/raspberry-pi.yaml instead (line offset == BCM number).
  # The pins are inert until you add a hardware backend to `backends` above.
  led:
    gpiochip: gpiochip0
    lines:
      ready: 32      # Cubie PB0 (pin 7)  | Pi: BCM27 (green)
      busy: 33       # Cubie PB1 (pin 11) | Pi: BCM22 (yellow)
      error: 34      # Cubie PB2 (pin 29) | Pi: BCM23 (red)

  buzzer:
    gpiochip: gpiochip0
    line: 37         # Cubie PB5 (pin 12) | Pi: BCM24

  # Addressable WS2812B / NeoPixel strip (1-10 LEDs) over SPI MOSI.
  # Enable SPI first and point `device` at the resulting node:
  #   Cubie A7S:     `sudo rsetup` -> Overlays -> enable `spidev on SPI1`,
  #                  then device: /dev/spidev1.0 (DIN to SPI1-MOSI = PD12 / pin 19)
  #   Raspberry Pi:  enable SPI (`sudo raspi-config` -> Interface Options -> SPI,
  #                  or `dtparam=spi=on`), then device: /dev/spidev0.0
  #                  (DIN to MOSI = BCM GPIO10 / pin 19)
  # New device: 2 green flashes, then a white fill gauge for ~3 s, then a magenta
  # pulse while waiting. Copy: blue 1..N progress bar (blinking). Error: all LEDs
  # blink red. Ready: first LED green. Service start: cyan wipe; stop: all off.
  ws2812:
    device: /dev/spidev0.0
    led_count: 1       # number of LEDs in the strip (1-10)

  # Seeed Grove LED Bar v2.0 (MY9221), bit-banged over two GPIO lines.
  # Detecting: brief (~3 s) fill gauge of the device. Copy: bar blinking at 10 Hz.
  # Error: whole bar blinks. Ready: single segment (3).
  grove_led_bar:
    gpiochip: gpiochip0
    clock_line: 108    # Cubie PD12 (pin 19) | Pi: BCM18 (Grove DCKI)
    data_line: 109     # Cubie PD13 (pin 21) | Pi: BCM17 (Grove DI)
    reverse: false     # flip if segment 1 is the wrong physical end

  # SPI e-paper display (black/white). Renders the transfer progress bar, the
  # used/free storage of source and target and the current phase. Add `epaper`
  # to `backends` above to enable it. The display keeps growing the bar with fast
  # partial refreshes and does an occasional full refresh to clear ghosting (and
  # always a full refresh when a device disappears).
  #
  # Pick the panel with `model` (fills controller + resolution + a default
  # rotation); override any field below as needed:
  #   waveshare-1.54          -- 200x200, SSD1681 (primary)
  #   waveshare-2.9           -- 296x128, SSD1680
  #   waveshare-2.13          -- 250x122, SSD1680 (Raspberry Pi HAT, V4)
  #   waveshare-2.13-hatplus  -- 250x122, SSD1680 (Raspberry Pi HAT+, Pi 5)
  #   weact-2.9               -- 296x128, SSD1680 (WeAct Studio, same driver)
  #   weact-3.7               -- 480x280, SSD1677 (ROADMAP -- not implemented yet)
  # The 2.13" HATs gate panel power on BCM18, so their presets default `pwr: 18`.
  #
  # Wiring (standard Waveshare module -> Raspberry Pi, BCM == line offset):
  #   VCC->3V3  GND->GND  DIN->MOSI/BCM10  CLK->SCLK/BCM11  CS->CE0/BCM8 (hardware)
  #   DC->BCM25  RST->BCM17  BUSY->BCM24. Enable SPI as for the ws2812 above; the
  #   node is /dev/spidev0.0 on the Pi (use /dev/spidev1.0 on the Cubie A7S).
  # NOTE: the e-paper cannot share an SPI bus with a ws2812 strip (the ws2812
  #   abuses MOSI with strict timing and no chip-select) -- use one or the other.
  epaper:
    model: waveshare-1.54
    device: /dev/spidev0.0
    spi_speed_hz: 4000000
    gpiochip: gpiochip0
    dc: 25             # Cubie: a free PIO offset | Pi: BCM25
    rst: 17            # Pi: BCM17
    busy: 24           # Pi: BCM24
    pwr: null          # optional panel power-enable pin (newer Waveshare revs)
    cs: null           # optional GPIO chip-select (default: SPI hardware CE0)
    rotation: 0        # 0 | 90 | 180 | 270 (content orientation; preset default)
    mirror: false
    busy_active_high: true
    full_refresh_every: 20      # force a full refresh after N partial updates
    partial_min_interval: 2.0   # seconds between partial updates

# Optional local web interface (status + progress + storage, file browser,
# optional transcoding). Served on all interfaces, so it is also reachable over
# the WLAN access point below.
web:
  enabled: false
  host: 0.0.0.0        # all interfaces; robust to interfaces going up/down
  port: 8080
  # Optional HTTP Basic auth for the whole interface (off by default). Sensible
  # once file download is reachable over the AP. Fail-safe: enabling this with an
  # empty password rejects every request rather than leaving it open.
  auth:
    enabled: false
    username: admin
    password: ""
  # Read-only browsing + download of the ATTACHED USB mass storage only (never
  # the OS partitions). Effective only while the web interface is enabled.
  files:
    enabled: true
    allow_download: true
    allow_delete: true                     # allow deleting a file from the ⚙ dialog
    browse_base: /run/copystation/browse   # separate from the transfer mounts
    idle_unmount_seconds: 120              # release a browsed volume when idle

# Optional WLAN access point so the station hosts its own network in the field
# (the web interface above is then reachable at http://<ipv4_address>:<port>/).
# Managed via NetworkManager (nmcli): the daemon (re)creates the profile from
# these values and brings it up on start. `ipv4.method shared` gives DHCP + NAT
# automatically. WPA2 needs a password of at least 8 characters; an empty
# password leaves the AP down. Requires NetworkManager (default on Raspberry Pi
# OS Bookworm and current Radxa images). It can also be toggled from a user
# button via the `wifi_ap` action below.
wifi_ap:
  enabled: false         # factory default; a runtime toggle (below) overrides it
  con_name: copystation-ap
  ssid: Copy_Station
  password: ""            # >= 8 chars for WPA2; empty -> AP stays down
  band: bg               # bg (2.4 GHz) | a (5 GHz)
  channel: 6
  ipv4_address: 10.42.0.1/24
  autoconnect: true
  ifname: ""             # empty -> NetworkManager picks the Wi-Fi interface
  # The AP on/off state is persisted in `user_settings_file` (top of this file)
  # when toggled at runtime (button/web), so it survives a restart INDEPENDENT of
  # `enabled` above -- the overlay wins when present. `enabled` is only the initial
  # state until the first toggle.
  # Captive portal: point all DNS at the AP and redirect port 80 to the web UI,
  # so a joining device auto-opens the interface ("Sign in to network") and stays
  # on the AP instead of falling back to mobile data. Needs web.enabled and port
  # 80 free. Note: AP clients then get no general internet (expected for a field
  # AP that only serves this UI).
  captive_portal: false
  captive_portal_port: 80

# Optional video transcoding / resolution change via ffmpeg. Jobs are submitted
# from the web interface (Files -> the ⚙ button on a video). The output is always
# written to a <output_dirname>/ folder on the SOURCE file's OWN medium (read-write)
# and is also downloadable. Serialised with the copy daemon, so a copy and a
# transcode never touch the same card at once. Needs ffmpeg installed
# (scripts/install.sh pulls it in); a no-op with a clear error otherwise. Off by default.
transcode:
  enabled: false
  output_dirname: Transcoded
  # Where the <output_dirname>/ folder is created on the source's own medium:
  #   same    -> next to the original file (default)
  #   central -> once at the medium's root
  # Only the factory default -- the live value is set from the web UI's Transcode
  # card and persisted in `user_settings_file` (top of this file), which then wins.
  output_location: same
  max_jobs: 1
  # Auto-transcode: after a successful copy, automatically queue a transcode of
  # every just-copied VIDEO file (written back onto the target, per output_location
  # above) using `default_preset`. The source card is cleanly unmounted BEFORE the batch
  # starts, so it can be removed while the transcodes run. This is only the
  # factory default -- the live value is toggled from the web UI's Transcode card
  # and persisted in `user_settings_file` (top of this file), which then wins.
  auto_transcode: false
  # Default preset id: preselected in the web UI's ⚙ dialogs and used by
  # auto-transcode. `null` (or an unknown id) falls back to the first preset
  # below. Changed from the web UI's Transcode card and persisted in
  # `user_settings_file` (top of this file).
  default_preset: null
  # Hardware acceleration. `auto` uses the board's hardware encoder when it is
  # present and falls back to the CPU otherwise:
  #   * Raspberry Pi 4  -> h264_v4l2m2m (H.264 in hardware, via ffmpeg)
  #   * Raspberry Pi 5  -> no hardware ENCODER exists -> CPU (libx264/libx265).
  #                        But HEVC (H.265) *input* is hardware-DECODED via ffmpeg
  #                        `-hwaccel drm` (the Pi 5's only codec block), which
  #                        offloads the decode and frees the CPU for the encode
  #                        (~1.4x faster on a 4K HEVC job). H.264 input has no
  #                        hardware decoder here and decodes on the CPU.
  #   * Radxa Cubie A7S -> H.264 AND H.265 in hardware via GStreamer OpenMAX
  #                        (omxh264videoenc / omxhevcvideoenc), with hardware
  #                        H.264/H.265 *decode* (omxh264dec / omxhevcvideodec) so
  #                        even 4K input is offloaded. A clean 1/2-step H.265 target
  #                        (e.g. 1080p) is a single HW pass ~10x faster than CPU
  #                        libx265 (needs a current image + mesa/libgbm; the HEVC
  #                        encoder falls back to CPU if unavailable). Needs the
  #                        gstreamer1.0 OMX plugin
  #                        (present on Radxa images); the daemon runs as root, so
  #                        it can open the /dev/cedar_dev + /dev/dma_heap nodes.
  # Set `cpu` to force software, or a specific ffmpeg encoder name (e.g.
  # h264_v4l2m2m) to force hardware. `fallback_to_cpu` retries on the CPU if the
  # hardware encoder fails at runtime.
  acceleration: auto        # auto | cpu | <ffmpeg encoder, e.g. h264_v4l2m2m>
  fallback_to_cpu: true
  # Buffer the transcode through RAM (a tmpfs) instead of reading and writing the
  # same card at once -- avoids the constant read/write seeking that is slow and
  # wears an SD card. Used only when the input (with output headroom) fits within
  # `ram_buffer_fraction` of the FREE RAM; larger files stream on the card. The
  # tmpfs is size-capped, so it never exceeds that fraction of free RAM.
  ram_buffer: true
  ram_buffer_fraction: 0.66  # use up to ~two thirds of the free RAM
  # Selectable presets. `height` downscales to that many lines keeping the aspect
  # ratio (width auto, even); `height: 0` keeps the source resolution. `vcodec`
  # is the software codec and picks the family (h264/hevc). There are two separate
  # quality knobs, one per encode path:
  #   * software / CPU: `crf` (lower = better + bigger) plus `preset` speed
  #     (`veryfast` is a good SBC default; `ultrafast` = fastest/biggest,
  #     `fast`/`medium`/`slow` = smaller). BOTH are ignored by hardware encoders.
  #   * hardware (Cubie A7S OMX H.264, Pi 4 V4L2): `bitrate` (e.g. `16M`). If it
  #     is unset, a generous height- AND framerate-aware default is used (a 60fps
  #     source gets ~2x a 30fps one). CRF does NOTHING here -- so if a hardware
  #     transcode looks poor, RAISE `bitrate` (that is the only quality lever).
  # A per-preset `accel:` overrides the global one.
  #
  # Which board actually uses which knob (the code picks the encoder for the
  # detected hardware, then the matching knob -- you never choose per board; write
  # all three and the right one is used):
  #   * Raspberry Pi 5  -> CPU always -> `crf` + `preset`. (An HEVC/H.265 INPUT is
  #     hardware-decoded via `-hwaccel drm` to go faster, but the ENCODE is CPU.)
  #   * Raspberry Pi 4  -> hardware H.264 -> `bitrate`; H.265 output -> CPU `crf`.
  #   * Radxa Cubie A7S -> hardware H.264 AND H.265 -> `bitrate`; a 4K->720p CPU
  #     finishing pass -> `crf`.
  # Expected speed for a 4K60 H.264 source (measured on-device; `x` = fraction of
  # real time -- see the README "Throughput you can expect" table for the full grid
  # and the Pi 4 note): to 1080p, Cubie ~0.66x (hardware, CPU idle -- for H.264 AND
  # H.265 output) and Pi 5 ~0.35x (CPU). The UI shows a per-job time estimate from
  # these and then learns the real value on your board.
  #
  # Cubie A7S single-pass note: the hardware DECODER scales only by 1/2 or 1/4, so
  # a `height` that is exactly the source height /2 or /4 is a single clean
  # hardware pass -- for a 4K (2160p) source that is `1080p` (1/2) and `540p`
  # (1/4). Any other height (e.g. `720p`) is hardware-scaled to the nearest larger
  # clean size and then finished to the exact height by a short ffmpeg CPU pass
  # (slower, more CPU). So `1080p` and `540p` are the fully-hardware presets for 4K.
  presets:
    # A preset carries BOTH knobs; each encode path uses its own (the ⚙ dialog
    # shows which path a file+preset takes):
    #   * single hardware pass (4K -> 1080p/540p): uses `bitrate`. The Allwinner
    #     encoder is inefficient and ignores everything but the bitrate, so these
    #     are generous -- a low bitrate is why hardware output looked soft.
    #   * HW + CPU finish (4K -> 720p): the CPU pass uses `crf` (quality-targeted).
    #     A high-detail 60fps source is hard to compress, so a good crf can still
    #     produce a large file -- that is the quality.
    # H.265 output is hardware on the Cubie (omxhevcvideoenc, `bitrate`) and on the
    # CPU (`crf`) elsewhere; `bitrate` can be lower than H.264 for the same quality.
    - { id: "1080p-h264", label: "1080p H.264", height: 1080, vcodec: libx264, crf: 21, preset: veryfast, bitrate: 24M }   # 4K -> single HW pass (1/2), bitrate
    - { id: "1080p-h265", label: "1080p H.265", height: 1080, vcodec: libx265, crf: 28, preset: veryfast, bitrate: 16M }   # Cubie: single HW HEVC pass; else CPU
    - { id: "540p-h264",  label: "540p H.264",  height: 540,  vcodec: libx264, crf: 23, preset: veryfast, bitrate: 12M }   # 4K -> single HW pass (1/4), bitrate
    - { id: "540p-h265",  label: "540p H.265",  height: 540,  vcodec: libx265, crf: 28, preset: veryfast, bitrate: 8M }    # Cubie: single HW HEVC pass; else CPU
    - { id: "720p-h264",  label: "720p H.264",  height: 720,  vcodec: libx264, crf: 24, preset: veryfast, bitrate: 10M }   # 4K -> HW 1080 + CPU finish, crf
    - { id: "720p-h265",  label: "720p H.265",  height: 720,  vcodec: libx265, crf: 28, preset: veryfast, bitrate: 8M }    # Cubie: HW HEVC 1080 + CPU finish

# In-browser video preview / playback. Clicking a file in the web browser plays
# it directly (download moves to the gear dialog). Sources a browser plays well
# (H.264 at/below `max_direct_height`, mp4/mov/webm) play smoothly; heavier ones
# (4K, HEVC, ...) still play the original but may stutter, and the player shows a
# hint to transcode the file (from the gear dialog) for smooth playback. Needs
# ffprobe; enabled with the file browser unless turned off here.
preview:
  enabled: true
  max_direct_height: 1080   # H.264 at/below this plays without the "transcode" hint

# Optional GPIO user button. Wire a momentary button between the GPIO line and
# GND and keep active_low + bias: pull_up. Every gesture starts with a short
# activation click (< max_click_seconds) followed by a 0.2-1.0 s release -- an
# intent check that is never counted, so nothing fires by accident. After it:
#  * press and HOLD hold_seconds        -> hold action (DJI-style shutdown:
#    click, release, hold 3 s; a plain long hold alone does nothing). A clean
#    `systemctl poweroff` is the safe way to power the station down -- cutting
#    the supply while the OS card is being written can corrupt it.
#  * 1-3 further short clicks, then >= max_gap_seconds silence -> single/
#    double/triple click action (a triple click is 4 presses in total).
# Actions: poweroff | reboot | none | {command: "shell command"}.
buttons:
  userbutton_1:
    enabled: false
    gpiochip: gpiochip0
    line: null           # button line offset (BCM number on Pi; gpioinfo offset on the Cubie)
    active_low: true      # pressed = pulled to GND
    bias: pull_up         # pull_up | pull_down | disable | as_is
    timing:
      max_click_seconds: 0.6   # a press shorter than this counts as a click
      min_gap_seconds: 0.2     # shorter releases are treated as contact bounce
      max_gap_seconds: 1.0     # a longer release ends the click sequence
      hold_seconds: 3.0        # hold after the activation click -> hold action
    actions:
      # poweroff | reboot | wifi_ap | auto_transcode | none | {command: "..."}
      #   wifi_ap toggles the WLAN access point (see wifi_ap: above); on a WS2812
      #   strip it plays a distinct blink code (cyan = on, amber = off) and the
      #   e-paper shows a "WiFi" badge while the AP is up.
      #   auto_transcode toggles auto-transcode after a copy (see transcode: above);
      #   it is persisted, shows an "Auto" e-paper badge while enabled and plays a
      #   purple WS2812 blink on each toggle.
      #   (reboot may hang on the A733 -- prefer poweroff.)
      hold: poweroff
      single_click: auto_transcode  # 1 click (after activation) toggles auto-transcode
      double_click: none
      triple_click: wifi_ap    # 3 clicks (after the activation click) toggle the AP

# Settle time (seconds) after device detection before mounting. This is the hard
# upper bound for how long detection waits for a device's volumes to enumerate.
settle_seconds: 2.0
# Adaptive debounce: proceed this many seconds after the LAST USB event instead
# of always waiting the full settle_seconds. Lower = faster detection; keep it at
# or above the gap between a single device's volumes appearing. settle_seconds
# remains the cap, so reliability is unchanged.
settle_quiet_seconds: 1.0
