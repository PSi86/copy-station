# Copy_Station example configuration -- Raspberry Pi 4 / 5
#
# Copy to /etc/copystation/config.yaml and adjust the GPIO line offsets.
#
# GPIO notes for the Pi:
# * The 40-pin header is on `gpiochip0` (Pi 4, and Pi 5 with recent kernels).
#   On older Pi 5 images the header is on `gpiochip4` (kept as an alias) -- set
#   `gpiochip: gpiochip4` then. Check with `gpiodetect` / `gpioinfo`.
# * The libgpiod line offset == the BCM GPIO number. So `data_line: 17` means
#   BCM GPIO17 (physical pin 11). Pick free BCM pins for your wiring.

mount_base: /run/copystation/mnt
media_dirname: DCIM

identify:
  source_usb_vendor_ids: []
  source_usb_product_ids: []
  min_partition_gb: 6
  require_source_smaller_than_target: true
  # Friendly web-UI names by USB VID/PID. 2ca3:0020 = DJI O4 Lite (confirmed).
  device_labels:
    - { vid: "2ca3", pid: "0020", name: "O4 Lite" }

cleanup:
  keep_dcim_folder: true

status:
  # Any combination of: log, led, buzzer, ws2812, grove_led_bar, epaper
  backends: [log, grove_led_bar]

  grove_led_bar:
    gpiochip: gpiochip0   # gpiochip4 on older Pi 5 images
    clock_line: 18        # BCM GPIO18 (example -- set to your wiring)
    data_line: 17         # BCM GPIO17 (example -- set to your wiring)
    reverse: false

  # Alternative single LEDs instead of the bar (BCM numbers):
  led:
    gpiochip: gpiochip0
    lines:
      ready: 27           # BCM GPIO27 (green)
      busy: 22            # BCM GPIO22 (yellow)
      error: 23           # BCM GPIO23 (red)

  # Alternative: addressable WS2812B / NeoPixel strip (1-10 LEDs) over SPI.
  # Enable SPI (`sudo raspi-config` -> Interface Options -> SPI, or `dtparam=spi=on`
  # in /boot/firmware/config.txt), then wire DIN to MOSI (BCM GPIO10 / pin 19). The
  # node is /dev/spidev0.0. Detecting = brief (~3 s) white fill gauge.
  ws2812:
    device: /dev/spidev0.0
    led_count: 10        # number of LEDs in the strip (1-10)

  # Alternative: SPI e-paper display (transfer bar + source/target storage +
  # phase). Add `epaper` to `backends` to enable. Standard Waveshare->Pi wiring:
  # DIN->BCM10, CLK->BCM11, CS->CE0/BCM8, DC->BCM25, RST->BCM17, BUSY->BCM24.
  # The 2.13" HATs/HAT+ plug straight onto the 40-pin header (no wiring) and use
  # these same pins plus power-enable on BCM18 (set via the preset's pwr: 18).
  # Cannot share the SPI bus with the ws2812 above -- use one or the other.
  epaper:
    # waveshare-1.54 | waveshare-2.9 | waveshare-2.13 | waveshare-2.13-hatplus | weact-2.9
    model: waveshare-2.13
    device: /dev/spidev0.0
    gpiochip: gpiochip0
    dc: 25                  # BCM GPIO25
    rst: 17                 # BCM GPIO17
    busy: 24                # BCM GPIO24
    # pwr: 18               # BCM GPIO18 -- preset default for the 2.13 HATs

  buzzer:
    gpiochip: gpiochip0
    line: 24              # BCM GPIO24

web:
  enabled: true
  host: 0.0.0.0
  port: 8080
  # Optional HTTP Basic auth for the whole interface (off by default). See
  # config.example.yaml for details. Sensible once files are reachable over the AP.
  auth:
    enabled: false
    username: admin
    password: ""
  # Read-only browsing + download of the ATTACHED USB storage (never the OS card).
  files:
    enabled: true
    allow_download: true

# Optional WLAN access point (NetworkManager). The Pi has on-board Wi-Fi, so the
# station can host its own network and the web UI is then reachable at
# http://10.42.0.1:8080/. WPA2 needs a password of at least 8 characters. See
# config.example.yaml for all options; toggle it from a button via `wifi_ap`.
wifi_ap:
  enabled: false
  ssid: Copy_Station
  password: ""            # >= 8 chars for WPA2; empty -> AP stays down
  band: bg
  channel: 6
  ipv4_address: 10.42.0.1/24

# Optional video transcoding via ffmpeg (writes to <output_dirname>/ on the
# chosen target volume, also downloadable). Needs ffmpeg (installed by
# scripts/install.sh). Off by default; see config.example.yaml for presets.
# `acceleration: auto` uses the Pi 4's h264_v4l2m2m hardware encoder; the Pi 5
# has no hardware encoder, so it encodes on the CPU (auto handles both). It falls
# back to the CPU automatically if a hardware encode fails.
transcode:
  enabled: false
  output_dirname: Transcoded
  acceleration: auto      # auto | cpu | <ffmpeg encoder, e.g. h264_v4l2m2m>
  fallback_to_cpu: true

# Optional GPIO user button. Shutdown gesture (DJI style): short click, release,
# then press and HOLD 3 s -- a plain long hold alone does nothing (intent check).
# Single/double/triple clicks (after the same activation click) are bindable too.
# Recommended pin: BCM GPIO3 (pin 5). Two independent functions on one button:
#  * Power ON / wake from halt is a Pi FIRMWARE feature on GPIO3 -- it needs NO
#    config and works even with enabled: false below.
#  * Shutting down needs software: set enabled: true here (line: 3). Do NOT also
#    use the OS overlay `dtoverlay=gpio-shutdown` on the same pin -- pick one.
# Pin 5 has fixed on-board pull-ups, so `bias` is irrelevant there.
buttons:
  userbutton_1:
    enabled: false        # set true to let this button trigger the actions below
    gpiochip: gpiochip0   # gpiochip4 on older Pi 5 images
    line: 3               # BCM GPIO3 (pin 5) -- doubles as wake-from-halt
    active_low: true
    bias: pull_up
    timing:
      max_click_seconds: 0.6
      min_gap_seconds: 0.2
      max_gap_seconds: 1.0
      hold_seconds: 3.0
    actions:
      hold: poweroff      # poweroff | reboot | wifi_ap | none | {command: "..."}
      single_click: none
      double_click: none
      triple_click: wifi_ap   # toggle the WLAN access point (see wifi_ap: above)

settle_seconds: 2.0
