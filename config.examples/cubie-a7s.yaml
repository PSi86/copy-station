# Copy_Station example configuration -- Radxa Cubie A7S (Allwinner A733)
#
# The installer copies this file to /etc/copystation/config.yaml automatically
# when it detects a Cubie. The GPIO line offsets below are concrete SUGGESTIONS
# for the 30-pin header -- confirm them once on the device (see below), then set
# `status.backends` to the hardware you actually wired up.
#
# How the suggested offsets were derived
# --------------------------------------
# The 30-pin header uses Allwinner port names (e.g. "PB0"). On the sunxi kernel
# the main-PIO ports all sit on ONE gpiochip and the libgpiod line offset is:
#
#       offset = (bank_letter - 'A') * 32 + pin_number
#
#   PB0  -> (1) * 32 +  0 =  32        PD12 -> (3) * 32 + 12 = 108
#   PB1  -> (1) * 32 +  1 =  33        PD13 -> (3) * 32 + 13 = 109
#   PB2  -> (1) * 32 +  2 =  34
#   PB5  -> (1) * 32 +  5 =  37
#
# Confirm on the device: `gpioinfo` prints every line with its name -- find the
# line named e.g. "PB0" and read the offset from its "line  N:" column. Use
# `gpiodetect` to confirm the main-PIO chip name (it exposes the most lines).
# Both tools come from the `gpiod` package the installer pulls in.
#
# Suggested wiring (all on the main PIO, so one gpiochip drives everything):
#   LED ready  -> header pin  7  (PB0)      LED busy   -> header pin 11  (PB1)
#   LED error  -> header pin 29  (PB2)      buzzer     -> header pin 12  (PB5)
#   Grove DCKI -> header pin 19  (PD12)     Grove DI   -> header pin 21  (PD13)

mount_base: /run/copystation/mnt
media_dirname: DCIM

identify:
  source_usb_vendor_ids: []
  source_usb_product_ids: []
  min_partition_gb: 6
  require_source_smaller_than_target: true
  # Friendly web-UI names by USB VID/PID. 2ca3:0020 = DJI O4 Lite (confirmed).
  device_labels:
    - { vid: "2ca3", pid: "0020", name: "O4 Lite" }

cleanup:
  keep_dcim_folder: true

status:
  # Drop the backends you do not use. `log` is always safe (journald only).
  backends: [log, grove_led_bar]

  grove_led_bar:
    gpiochip: gpiochip0   # confirm main PIO with `gpiodetect`
    clock_line: 108       # PD12 (pin 19) -- confirm with `gpioinfo`
    data_line: 109        # PD13 (pin 21) -- confirm with `gpioinfo`
    reverse: false        # flip if segment 1 is the wrong physical end

  led:
    gpiochip: gpiochip0
    lines:
      ready: 32           # PB0 (pin 7)  -- green
      busy: 33            # PB1 (pin 11) -- yellow
      error: 34           # PB2 (pin 29) -- red

  # Alternative: addressable WS2812B / NeoPixel strip (1-10 LEDs) over SPI.
  # Enable the SPI overlay: run `sudo rsetup` -> Overlays -> enable `spidev on
  # SPI1`, then reboot. Wire DIN to SPI1-MOSI = PD12 (header pin 19); only MOSI is
  # used (MISO/CLK/CS unconnected).
  # NOTE: PD12/PD13 (pins 19/21) are the SAME pins the Grove bar above uses --
  # drive one of the two, not both. After enabling, find the bus with
  # `ls /dev/spidev*` (it is /dev/spidev1.0) and set it as `device` below.
  ws2812:
    device: /dev/spidev1.0
    led_count: 10        # number of LEDs in the strip (1-10)

  buzzer:
    gpiochip: gpiochip0
    line: 37              # PB5 (pin 12)

web:
  enabled: true
  host: 0.0.0.0
  port: 8080

# Optional GPIO shutdown button for a clean poweroff (set the line from `gpioinfo`).
power:
  shutdown_button:
    enabled: false
    gpiochip: gpiochip0
    line: null            # line offset of the button (from `gpioinfo`)
    active_low: true
    bias: pull_up
    hold_seconds: 1.0
    action: poweroff      # reboot may hang on the A733 -- prefer poweroff

settle_seconds: 2.0
